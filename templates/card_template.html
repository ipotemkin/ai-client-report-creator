<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>{{ product_name }}</title>
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    body {
      font-family: Calibri, "Segoe UI", Arial, "Helvetica Neue", Helvetica,
        sans-serif;
    }
    /* Явная высота — у WeasyPrint иначе ломается блок с absolute + фон */
    .sheet {
      position: relative;
      width: 210mm;
      height: 297mm;
      overflow: hidden;
      background: #111;
    }
    /* <img> надёжнее CSS background-image для PDF */
    .bg {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 0;
      display: block;
      margin: 0;
      padding: 0;
      border: none;
    }
    .fade {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.1) 0%,
        rgba(0, 0, 0, 0.55) 55%,
        rgba(0, 0, 0, 0.82) 100%
      );
    }
    .content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14mm 16mm 18mm;
      color: #fff;
      z-index: 2;
    }
    .name {
      margin: 0 0 6px;
      font-size: 22pt;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }
    .price {
      margin: 0 0 12px;
      font-size: 26pt;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #fef08a;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.5);
    }
    .desc {
      margin: 0;
      font-size: 11pt;
      line-height: 1.45;
      max-width: 100%;
      white-space: pre-wrap;
      opacity: 0.96;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.55);
    }
    .badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 8.5pt;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(37, 99, 235, 0.92);
    }
  </style>
</head>
<body>
  <div class="sheet">
    <img
      class="bg"
      src="{{ background_image }}"
      alt=""
    />
    <div class="fade" aria-hidden="true"></div>
    <div class="content">
      <div class="badge">Маркетплейс</div>
      <h1 class="name">{{ product_name }}</h1>
      <div class="price">{{ price }}</div>
      <p class="desc">{{ description }}</p>
    </div>
  </div>
</body>
</html>
